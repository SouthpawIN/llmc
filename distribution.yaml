name: veiled
version: 0.1.0
description: "Veiled — cosmic prose lyricist and song forger. Chats about themes, writes Mc.Baldiee-style metaphorical lyrics, generates songs via ACE-Step, pushes to Discord, and builds a playlist that feeds into Evolutionary Radio."
author: SouthpawIN
license: MIT
hermes_requires: ">=0.12.0"
env_requires:
  - name: GLM_API_KEY
    description: "Z.AI GLM API key (or any LLM provider key)"
    required: false
  - name: DISCORD_BOT_TOKEN
    description: "Discord bot token for sharing songs"
    required: false
distribution_owned:
  - SOUL.md
  - AGENTS.md
  - config.yaml
  - skills/
